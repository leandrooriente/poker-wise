name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript type check
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    env:
      POSTGRES_URL: postgresql://user:pass@localhost:5432/db
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      AUTH_SECRET: "auth-secret-01234567890123456789012345678901"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test

  e2e-setup:
    name: E2E Setup (Database Reset)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: db
          PGPASSWORD: pass
        options: >-
          --health-cmd "pg_isready -U user -d db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      POSTGRES_URL: postgresql://user:pass@localhost:5432/db
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      AUTH_SECRET: "auth-secret-01234567890123456789012345678901"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Reset database
        run: npm run db:reset

  await-vercel-preview:
    name: Await Vercel Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      preview_url: ${{ steps.await-vercel.outputs.deploymentDetails.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI and jq
        run: npm install --global vercel@latest jq

      - name: Get Vercel preview deployment URL
        id: get-preview-url
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          # Get deployment info for this branch
          DEPLOYMENT_INFO=$(vercel --scope $VERCEL_ORG_ID --token $VERCEL_TOKEN --project $VERCEL_PROJECT_ID --branch $BRANCH_NAME --environment preview --json 2>/dev/null || echo "{}")
          echo "Deployment info: $DEPLOYMENT_INFO"
          PREVIEW_URL=$(echo $DEPLOYMENT_INFO | jq -r '.url // ""')
          if [ -z "$PREVIEW_URL" ]; then
            echo "Failed to get preview URL from Vercel CLI. Trying Vercel API..."
            # Fallback to Vercel API
            API_RESPONSE=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&target=preview&state=READY,QUEUED,BUILDING,DEPLOYING" \
              | jq -r ".deployments[] | select(.meta.githubCommitRef == \"$BRANCH_NAME\") | .url // \"\"")
            PREVIEW_URL=$(echo "$API_RESPONSE" | head -n1)
          fi
          if [ -z "$PREVIEW_URL" ]; then
            echo "No preview deployment found for branch $BRANCH_NAME"
            exit 1
          fi
          echo "Preview URL: $PREVIEW_URL"
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Await Vercel preview deployment to be ready
        id: await-vercel
        uses: UnlyEd/github-action-await-vercel@v1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        with:
          deployment-url: ${{ steps.get-preview-url.outputs.preview_url }}
          timeout: 300
          poll-interval: 10

  e2e-pr-preview:
    name: E2E Tests (PR Preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: await-vercel-preview
    timeout-minutes: 15
    env:
      BASE_URL: https://${{ needs.await-vercel-preview.outputs.preview_url }}
    strategy:
      fail-fast: false
      matrix:
        shard_part: [1]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against preview
        run: npm run e2e -- --project=chromium --shard=${{ matrix.shard_part }}/1

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-preview
          path: playwright-report/
          retention-days: 7

  e2e-chromium-matrix:
    name: E2E Tests (Chromium) - Shard ${{ matrix.shard_part }}/2
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 15
    needs: e2e-setup
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: db
          PGPASSWORD: pass
        options: >-
          --health-cmd "pg_isready -U user -d db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      POSTGRES_URL: postgresql://user:pass@localhost:5432/db
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      AUTH_SECRET: "auth-secret-01234567890123456789012345678901"
    strategy:
      fail-fast: false
      matrix:
        shard_part: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build application for CI
        run: npm run build

      - name: Run E2E tests with sharding
        run: npm run e2e -- --project=chromium --shard=${{ matrix.shard_part }}/2

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard_part }}-2
          path: playwright-report/
          retention-days: 7
