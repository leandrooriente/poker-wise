name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript type check
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    env:
      POSTGRES_URL: postgresql://user:pass@localhost:5432/db
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      AUTH_SECRET: "auth-secret-01234567890123456789012345678901"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test

  e2e-setup:
    name: E2E Setup (Database Reset)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: db
          PGPASSWORD: pass
        options: >-
          --health-cmd "pg_isready -U user -d db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      POSTGRES_URL: postgresql://user:pass@localhost:5432/db
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      AUTH_SECRET: "auth-secret-01234567890123456789012345678901"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Reset database
        run: npm run db:reset

  await-vercel-preview:
    name: Await Vercel Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      preview_url: ${{ steps.await-preview.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Find and await Vercel preview deployment matching PR SHA
        id: await-preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          TARGET_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Looking for Vercel preview deployment matching PR SHA: $TARGET_SHA"

          # Validate required environment variables
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "❌ ERROR: VERCEL_TOKEN is not set. Please add it as a GitHub Secret."
            echo "   You can set it in your repository settings under Settings > Secrets and variables > Actions"
            exit 1
          fi
          if [ -z "$VERCEL_TEAM_ID" ]; then
            echo "❌ ERROR: VERCEL_TEAM_ID is not set. Please add it as a GitHub Secret."
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "❌ ERROR: VERCEL_PROJECT_ID is not set. Please add it as a GitHub Secret."
            exit 1
          fi

          echo "VERCEL_TEAM_ID: ${VERCEL_TEAM_ID:0:10}..."
          echo "VERCEL_PROJECT_ID: ${VERCEL_PROJECT_ID:0:10}..."
          echo "VERCEL_TOKEN present: ${#VERCEL_TOKEN}"

          # Vercel CLI will automatically use VERCEL_TOKEN environment variable
          # No need to login explicitly in CI

          # Get preview deployments for the project
          echo "Fetching preview deployments for project $VERCEL_PROJECT_ID..."

          # Build vercel list command
          VERCEL_CMD="vercel list"
          if [ -n "$VERCEL_PROJECT_ID" ]; then
            VERCEL_CMD="$VERCEL_CMD --project $VERCEL_PROJECT_ID"
          fi
          if [ -n "$VERCEL_TEAM_ID" ]; then
            VERCEL_CMD="$VERCEL_CMD --scope $VERCEL_TEAM_ID"
          fi
          VERCEL_CMD="$VERCEL_CMD --environment preview --json"

          echo "Running: $VERCEL_CMD"
          DEPLOYMENTS=$($VERCEL_CMD 2>/dev/null || echo "[]")

          # Debug: show deployment count and first few entries
          DEPLOYMENT_COUNT=$(echo "$DEPLOYMENTS" | jq '. | length')
          echo "Found $DEPLOYMENT_COUNT preview deployment(s)"
          if [ "$DEPLOYMENT_COUNT" -gt 0 ]; then
            echo "First deployment metadata:"
            echo "$DEPLOYMENTS" | jq '.[0] | {sha: .meta.githubCommitSha, url: .url, state: .state, readyState: .readyState, createdAt: .createdAt, meta: .meta}'
          fi

          # Find deployment with matching SHA
          echo "Searching for deployment with SHA $TARGET_SHA..."
          DEPLOYMENT_URL=$(echo "$DEPLOYMENTS" | jq -r --arg sha "$TARGET_SHA" \
            '.[] | select(.meta.githubCommitSha == $sha) | .url' | head -n1)

          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "❌ No Vercel preview deployment found for SHA $TARGET_SHA"
            echo "Available deployments (showing first 5):"
            echo "$DEPLOYMENTS" | jq '.[:5] | .[] | {sha: .meta.githubCommitSha, url: .url, state: .state, readyState: .readyState, createdAt: .createdAt}'
            
            # Wait and retry once (deployment might still be queued)
            echo "Waiting 30 seconds and retrying..."
            sleep 30
            DEPLOYMENTS=$($VERCEL_CMD 2>/dev/null || echo "[]")
            DEPLOYMENT_URL=$(echo "$DEPLOYMENTS" | jq -r --arg sha "$TARGET_SHA" \
              '.[] | select(.meta.githubCommitSha == $sha) | .url' | head -n1)
            
            if [ -z "$DEPLOYMENT_URL" ]; then
              echo "❌ Still no deployment found after waiting. Exiting."
              exit 1
            fi
          fi

          echo "✅ Found deployment: $DEPLOYMENT_URL"
          echo "Waiting for deployment to be ready..."

          # Build vercel inspect command
          INSPECT_CMD="vercel inspect $DEPLOYMENT_URL"
          if [ -n "$VERCEL_TEAM_ID" ]; then
            INSPECT_CMD="$INSPECT_CMD --scope $VERCEL_TEAM_ID"
          fi
          INSPECT_CMD="$INSPECT_CMD --wait --timeout 300"

          echo "Running: $INSPECT_CMD"
          if ! $INSPECT_CMD; then
            echo "❌ Failed to wait for deployment $DEPLOYMENT_URL"
            echo "Checking deployment state..."
            DEPLOYMENT_INFO=$(vercel inspect $DEPLOYMENT_URL --json 2>/dev/null || echo "{}")
            echo "$DEPLOYMENT_INFO" | jq '.'
            exit 1
          fi

          echo "✅ Deployment is ready: $DEPLOYMENT_URL"
          echo "preview_url=https://$DEPLOYMENT_URL" >> $GITHUB_OUTPUT

  e2e-pr-preview:
    name: E2E Tests (PR Preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: await-vercel-preview
    timeout-minutes: 15
    env:
      BASE_URL: ${{ needs.await-vercel-preview.outputs.preview_url }}
    strategy:
      fail-fast: false
      matrix:
        shard_part: [1]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against preview
        run: npm run e2e -- --project=chromium --shard=${{ matrix.shard_part }}/1

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-preview
          path: playwright-report/
          retention-days: 7

  e2e-chromium-matrix:
    name: E2E Tests (Chromium) - Shard ${{ matrix.shard_part }}/2
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 15
    needs: e2e-setup
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: db
          PGPASSWORD: pass
        options: >-
          --health-cmd "pg_isready -U user -d db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      POSTGRES_URL: postgresql://user:pass@localhost:5432/db
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      AUTH_SECRET: "auth-secret-01234567890123456789012345678901"
    strategy:
      fail-fast: false
      matrix:
        shard_part: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build application for CI
        run: npm run build

      - name: Run E2E tests with sharding
        run: npm run e2e -- --project=chromium --shard=${{ matrix.shard_part }}/2

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shard_part }}-2
          path: playwright-report/
          retention-days: 7
