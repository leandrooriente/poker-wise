name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript type check
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    env:
      POSTGRES_URL: postgresql://user:pass@localhost:5432/db
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test

  await-vercel-preview:
    name: Await Vercel Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      preview_url: ${{ steps.await-preview.outputs.preview_url }}
      project_id: ${{ steps.await-preview.outputs.project_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Find and await Vercel preview deployment matching PR SHA
        id: await-preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TARGET_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Looking for Vercel preview deployment matching PR SHA: $TARGET_SHA"

          # Validate required environment variables
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "❌ ERROR: VERCEL_TOKEN is not set. Please add it as a GitHub Secret."
            echo "   You can set it in your repository settings under Settings > Secrets and variables > Actions"
            exit 1
          fi

          # Get preview deployments matching the PR commit SHA
          echo "Looking for Vercel preview deployments for commit SHA: $TARGET_SHA..."

          # Use the commit SHA metadata to locate the exact preview deployment
          VERCEL_CMD="vercel ls -m githubCommitSha=$TARGET_SHA --environment preview --format json --token=$VERCEL_TOKEN"

          echo "Running filtered preview lookup"
          RESPONSE=$($VERCEL_CMD 2>/dev/null || echo '{"deployments":[]}')
          DEPLOYMENTS=$(echo "$RESPONSE" | jq '.deployments // []')
          DEPLOYMENT_COUNT=$(echo "$DEPLOYMENTS" | jq '. | length')
          echo "Found $DEPLOYMENT_COUNT preview deployment(s) matching SHA $TARGET_SHA"
          if [ "$DEPLOYMENT_COUNT" -gt 0 ]; then
            echo "Debug first deployment keys:"
            echo "$DEPLOYMENTS" | jq '.[0] | keys' || true
            echo "Debug first deployment projectId:"
            echo "$DEPLOYMENTS" | jq '.[0].projectId' || true
          fi

          # Find deployment with matching SHA
          echo "Searching for deployment with SHA $TARGET_SHA..."
          DEPLOYMENT_URL=$(echo "$DEPLOYMENTS" | jq -r --arg sha "$TARGET_SHA" \
            '.[] | select(.meta.githubCommitSha == $sha) | .url' | head -n1)
          PROJECT_ID=$(echo "$DEPLOYMENTS" | jq -r --arg sha "$TARGET_SHA" \
            '.[] | select(.meta.githubCommitSha == $sha) | .projectId' | head -n1)

          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "❌ No Vercel preview deployment found for SHA $TARGET_SHA"
            echo "$RESPONSE" | jq '.'

            # Wait and retry once (deployment might still be queued)
            echo "Waiting 30 seconds and retrying..."
            sleep 30
            RESPONSE=$($VERCEL_CMD 2>/dev/null || echo '{"deployments":[]}')
            DEPLOYMENTS=$(echo "$RESPONSE" | jq '.deployments // []')
            DEPLOYMENT_URL=$(echo "$DEPLOYMENTS" | jq -r --arg sha "$TARGET_SHA" \
              '.[] | select(.meta.githubCommitSha == $sha) | .url' | head -n1)
            
            if [ -z "$DEPLOYMENT_URL" ]; then
              echo "❌ Still no deployment found after waiting. Exiting."
              exit 1
            fi
          fi

          echo "✅ Found deployment: $DEPLOYMENT_URL"
          echo "Waiting for deployment to be ready..."

          INSPECT_CMD="vercel inspect $DEPLOYMENT_URL --wait --timeout 300 --token=$VERCEL_TOKEN"

          echo "Running deployment readiness check"
          if ! $INSPECT_CMD; then
            echo "❌ Failed to wait for deployment $DEPLOYMENT_URL"
            echo "Checking deployment state..."
            DEPLOYMENT_INFO=$(vercel inspect $DEPLOYMENT_URL --format json --token=$VERCEL_TOKEN 2>/dev/null || echo "{}")
            echo "$DEPLOYMENT_INFO" | jq '.'
            exit 1
          fi

          echo "✅ Deployment is ready: $DEPLOYMENT_URL"
          echo "preview_url=https://$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID=$(jq -r .projectId .vercel/project.json 2>/dev/null || echo "")
          fi
          if [ -n "$PROJECT_ID" ]; then
            echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          fi

  e2e-preview:
    name: E2E Tests (Preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: await-vercel-preview
    timeout-minutes: 15
    env:
      BASE_URL: ${{ needs.await-vercel-preview.outputs.preview_url }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      PROJECT_ID: ${{ needs.await-vercel-preview.outputs.project_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Wait for preview app content
        run: npm run preview:wait

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project
        run: vercel link --yes --token=$VERCEL_TOKEN

      - name: Pull preview environment variables
        run: vercel env pull .env.preview --environment=preview --token=$VERCEL_TOKEN

      # Database initialization is now handled by the prebuild script in package.json
      # which runs automatically during Vercel deployment build.
      # Skipping seeding step because database connection is not accessible from CI.
      # - name: Seed preview database
      #   run: |
      #     set -a
      #     source .env.preview
      #     set +a
      #     npm run db:init

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against preview
        run: npm run e2e -- --project=chromium --workers=1 --max-failures=1

      - name: Capture Vercel logs on failure
        if: failure()
        run: |
          echo "Capturing Vercel logs for deployment: $BASE_URL"
          # Extract domain from BASE_URL (remove https://)
          DOMAIN="${BASE_URL#https://}"
          vercel logs "$DOMAIN" --since 5m --token=$VERCEL_TOKEN > vercel.logs 2>&1 || echo "Failed to fetch logs"
          cat vercel.logs
          echo "=== End of logs ==="

      - name: Upload Vercel logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vercel-logs-preview
          path: vercel.logs
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-preview
          path: playwright-report/
          retention-days: 7
